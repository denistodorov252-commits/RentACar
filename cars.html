<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rent-a-Car - Нашият автопарк</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .car-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-bottom: 20px;
            height: 100%;
        }
        .car-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .car-img {
            height: 200px;
            object-fit: cover;
            width: 100%;
        }
        .price-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(13, 110, 253, 0.9);
            padding: 5px 10px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
        }
        .filter-section {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .btn-rent {
            width: 100%;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Rent-a-Car</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="navLinks">
                    <!-- Will be populated by JavaScript -->
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <h1 class="text-center mb-5">Нашият автопарк</h1>
        
        <div class="filter-section">
            <div class="row">
                <div class="col-md-3">
                    <label for="carType" class="form-label">Тип автомобил</label>
                    <select class="form-select" id="carType">
                        <option value="all">Всички</option>
                        <option value="sedan">Седан</option>
                        <option value="suv">SUV</option>
                        <option value="hatchback">Хечбек</option>
                        <option value="coupe">Купе</option>
                        <option value="convertible">Кабрио</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="priceRange" class="form-label">Ценови диапазон</label>
                    <select class="form-select" id="priceRange">
                        <option value="all">Всички</option>
                        <option value="0-50">До 50 лв/ден</option>
                        <option value="50-100">50-100 лв/ден</option>
                        <option value="100-150">100-150 лв/ден</option>
                        <option value="150+">Над 150 лв/ден</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="transmission" class="form-label">Скоростна кутия</label>
                    <select class="form-select" id="transmission">
                        <option value="all">Всички</option>
                        <option value="automatic">Автоматична</option>
                        <option value="manual">Ръчна</option>
                    </select>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button class="btn btn-primary w-100" id="applyFilters">Приложи филтри</button>
                </div>
            </div>
        </div>

        <div class="row" id="carsContainer">
            <!-- JavaScript will generate cars here -->
        </div>
    </main>

    <!-- Reservation Modal -->
    <div class="modal fade" id="reservationModal" tabindex="-1" aria-labelledby="reservationModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="reservationModalLabel">Резервирайте автомобил</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="reservationForm">
                        <input type="hidden" id="reservationCarId">
                        <div class="mb-3">
                            <label for="reservationDates" class="form-label">Период на наем</label>
                            <input type="text" class="form-control" id="reservationDates" placeholder="Изберете дати">
                        </div>
                        <div class="mb-3">
                            <label for="reservationName" class="form-label">Име и фамилия</label>
                            <input type="text" class="form-control" id="reservationName" readonly>
                        </div>
                        <div class="mb-3">
                            <label for="reservationPhone" class="form-label">Телефон</label>
                            <input type="tel" class="form-control" id="reservationPhone">
                        </div>
                        <div class="mb-3">
                            <label for="reservationNotes" class="form-label">Допълнителни бележки</label>
                            <textarea class="form-control" id="reservationNotes" rows="3"></textarea>
                        </div>
                        <div class="alert alert-info">
                            <p id="reservationSummary"></p>
                            <p id="reservationPrice"></p>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Направи резервация</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container">
            <div class="row">
                <div class="col-md-4">
                    <h5>Rent-a-Car</h5>
                    <p>Вашият надежден партньор при наем на автомобили</p>
                </div>
                <div class="col-md-4">
                    <h5>Контакти</h5>
                    <p>Телефон: 0888 123 456</p>
                    <p>Имейл: info@rentacar.bg</p>
                </div>
                <div class="col-md-4">
                    <h5>Последвайте ни</h5>
                    <div class="social-icons">
                        <a href="#" class="text-white me-2"><i class="fab fa-facebook-f"></i></a>
                        <a href="#" class="text-white me-2"><i class="fab fa-instagram"></i></a>
                        <a href="#" class="text-white"><i class="fab fa-twitter"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/bg.js"></script>
    <script src="auth.js"></script>
    <script src="cars.js"></script>
</body>
</html>
